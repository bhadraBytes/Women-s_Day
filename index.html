<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>Maro Jaanudo · surprise awaits</title>
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Dancing+Script:wght@400;700&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ---------- RESET & BASE ---------- */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #1a0c1a;
        font-family: "Playfair Display", serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        overflow-x: hidden;
        position: relative;
        color: #f3d9f3;
      }

      /* dreamy background */
      .dreamscape {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background: linear-gradient(145deg, #f8e1f1, #d5b0d5, #b288b2);
      }

      /* main card */
      .maro-sanctum {
        position: relative;
        z-index: 20;
        width: 100%;
        max-width: 1300px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      .unified-altar {
        display: flex;
        flex-wrap: wrap;
        background: rgba(90, 45, 90, 0.6);
        backdrop-filter: blur(18px) saturate(180%);
        border-radius: 48px;
        border: 2px solid rgba(255, 200, 240, 0.7);
        box-shadow:
          0 40px 70px rgba(70, 20, 70, 0.5),
          0 0 0 3px rgba(255, 200, 255, 0.3) inset,
          0 0 80px #ffb8ff;
        width: 100%;
        overflow: hidden;
      }

      .altar-left {
        flex: 1 1 380px;
        padding: 2.5rem 2.2rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: linear-gradient(
          145deg,
          rgba(140, 70, 140, 0.5),
          rgba(70, 30, 70, 0.6)
        );
        border-right: 2px dashed #e4b0e4;
      }

      .blessing-title {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 900;
        line-height: 1.2;
        text-shadow:
          0 0 30px #ffb3ff,
          3px 3px 0 #732c73;
        color: #ffedff;
      }
      .blessing-title span {
        font-family: "Dancing Script", cursive;
        display: block;
        font-size: 1.8rem;
        color: #ffeeb5;
        text-shadow: 0 0 20px gold;
      }

      .typewriter-container {
        min-height: 100px;
        margin: 1.2rem 0 0.8rem;
      }
      .song-lyrics {
        font-size: 1.5rem;
        font-style: italic;
        border-left: 6px solid #f5b0f5;
        padding-left: 1.8rem;
        color: #fef1fe;
        line-height: 1.4;
        font-weight: 500;
        white-space: pre-wrap;
      }
      .cursor {
        display: inline-block;
        width: 4px;
        margin-left: 4px;
        background: #f5b0f5;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .signature {
        font-family: "Dancing Script", cursive;
        font-size: 2.5rem;
        color: #ffdbff;
        margin: 1rem 0 1rem;
        text-align: right;
        letter-spacing: 1px;
      }

      .spantxt {
        font-size: 2.5rem;
        display: block;
        margin-top: 20px;
      }
      @media (max-width: 480px) {
        .signature {
          font-size: 2rem;
        }
      }
      .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-top: 0.5rem;
      }
      .magic-btn {
        background: linear-gradient(135deg, #cd93cd, #7a4c7a);
        border: none;
        padding: 1rem 0rem;
        font-size: 1.6rem;
        font-weight: bold;
        border-radius: 60px;
        color: #fbeafe;
        cursor: pointer;
        box-shadow:
          0 15px 35px #aa5faa,
          0 0 30px #ffb3ff;
        transition: all 0.25s;
        letter-spacing: 1px;
        border: 2px solid #ffb3ff;
        flex: 1 1 auto;
        min-width: 200px;
      }
      .magic-btn:active {
        transform: scale(0.95);
        background: #9a659a;
      }

            @media (max-width: 480px) {
      .magic-btn {
        padding: 1rem 0rem;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 60px;
        color: #fbeafe;
        cursor: pointer;
        box-shadow:
          0 15px 35px #aa5faa,
          0 0 30px #ffb3ff;
        transition: all 0.25s;
        letter-spacing: 1px;
        border: 2px solid #ffb3ff;
        flex: 1 1 auto;
        min-width: 200px;
      }
      }

      .secret-revelation {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.9s cubic-bezier(0.33, 1, 0.68, 1),
          padding 0.6s;
        background: #a4519e80;
        backdrop-filter: blur(20px);
        border-radius: 60px;
        margin-top: 1rem;
        font-size: 1.2rem;
        border: 2px solid #f5b0f5;
        color: #fff3fc;
        text-align: center;
      }
      @media (max-width: 480px) {
      .spantxt {
        font-size: 1.1rem;
      }
    }
      .secret-revelation.show {
        max-height: fit-content;
        padding: 2rem 2.2rem;
      }

      /* cute small button inside secret message */
      .cute-btn {
        background: #ffc2ff;
        border: none;
        padding: 0.8rem 2rem;
        font-size: 1.8rem;
        border-radius: 40px;
        color: #4a1d4a;
        cursor: pointer;
        box-shadow: 0 5px 15px #d580d5;
        transition: 0.2s;
        margin-top: 1.5rem;
        font-family: "Dancing Script", cursive;
        font-weight: bold;
        border: 2px solid white;
      }
      .cute-btn:hover {
        background: #ffadff;
        transform: scale(1.05);
      }
      .cute-btn:active {
        transform: scale(0.95);
      }

      
      @media (max-width: 480px) {
        .cute-btn {
          padding: 0.5rem 1rem;
          font-size: 1.1rem;
          cursor: pointer;
          box-shadow: 0 5px 15px #d580d5;
          transition: 0.2s;
          margin-top: 1.5rem;
        }
      }

      .altar-right {
        flex: 1 1 380px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: rgba(0, 0, 0, 0.15);
      }
      .frame-arcane {
        background: #e7c0e7;
        padding: 1.5rem 1.5rem 3rem;
        border-radius: 40px 40px 90px 90px;
        transform: rotate(2deg) perspective(800px) rotateY(-2deg);
        box-shadow:
          30px 30px 60px #301630,
          0 0 0 4px #fad1fa,
          0 0 70px #ffc1ff;
        max-width: 380px;
        width: 100%;
      }
      .photo-holder {
        aspect-ratio: 1 / 1.2;
        background: #b482b4;
        border-radius: 30px 30px 50px 50px;
        overflow: hidden;
        border: 8px solid white;
      }
      .photo-holder img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .polaroid-caption {
        text-align: center;
        font-size: 2.2rem;
        font-weight: 900;
        color: #ffe7ff;
        text-shadow:
          0 0 35px #ffb3ec,
          5px 5px 0 #863886;
        background: #321a3280;
        backdrop-filter: blur(6px);
        margin-top: 1.2rem;
        border-radius: 50px;
        padding: 0.5rem 0;
        font-family: "Dancing Script", cursive;
      }

            @media (max-width: 480px) {
      .polaroid-caption {
        text-align: center;
        font-size: 1.8rem;
        font-weight: 900;
        color: #ffe7ff;
        text-shadow:
          0 0 35px #ffb3ec,
          5px 5px 0 #863886;
        background: #321a3280;
        backdrop-filter: blur(6px);
        margin-top: 1rem;
        border-radius: 50px;
        padding: 0.5rem 0;
        padding-bottom: 10%;
        font-family: "Dancing Script", cursive;
        }
      }
              

      /* hide audio */
      #bgMusic {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="dreamscape" id="dreamBg"></div>

    <!-- main card -->
    <div class="maro-sanctum" id="act1">
      <div class="unified-altar">
        <div class="altar-left">
          <div class="blessing-title">For my <span>Maro Jaanudo</span></div>
          <!-- typewriter lyrics -->
          <div class="typewriter-container">
            <div id="songLyrics" class="song-lyrics"></div>
            <span class="cursor" id="cursor"></span>
          </div>
          <div class="signature">💜 Only Yours Kiklo 💜</div>
          <div class="button-group">
            <button class="magic-btn" id="secretBtn">
              🌸 khul jaa sim sim 🌸
            </button>
          </div>
          <div id="secretMessage" class="secret-revelation">
            <span style="font-size: 2rem">✨❤️✨</span><br />
            “Meri zindagi ki kitaab mein, har safha tumse shuru hota hai.<br />
            Jab se tum ho, dil ko sukoon mila. You are my home, my peace.<br />
            I love you more than all the stars in the sky.<br />
            <span class="spantxt">💜 MARO JAANUDO 💜</span>
            <!-- this button now redirects to flower.html -->
            <button class="cute-btn" id="flowerRevealBtn">
              🌺 This is for you 🌺
            </button>
          </div>
        </div>
        <div class="altar-right">
          <div class="frame-arcane">
            <div class="photo-holder">
              <!-- placeholder image (replace with her photo) -->
              <img src="/janudo.jpg" alt="Maro Jaanudo" />
            </div>
            <div class="polaroid-caption">💜 meri jaan 💜</div>
          </div>
        </div>
      </div>
    </div>

    <!-- audio (autoplay on load) -->
    <audio id="bgMusic" loop preload="auto">
      <source src="./haiye hali aave.m4a" type="audio/mpeg" />
      <!-- replace with your song file -->
    </audio>

    <script>
      (function () {
        // typewriter effect
        const lyrics = `“Sambhad ne tu malva aave ane jota j bheti jaay evi ichchha he aaje
Ane ghanghor vadli banine varhi jaay evi ichchha he aaje”`;
        const lyricsDiv = document.getElementById("songLyrics");
        const cursor = document.getElementById("cursor");
        let i = 0;
        function typeWriter() {
          if (i < lyrics.length) {
            lyricsDiv.innerHTML += lyrics.charAt(i);
            i++;
            setTimeout(typeWriter, 80);
          } else {
            cursor.style.display = "none";
          }
        }

        const secretBtn = document.getElementById("secretBtn");
        const flowerBtn = document.getElementById("flowerRevealBtn");
        const secretDiv = document.getElementById("secretMessage");
        const audio = document.getElementById("bgMusic");

        // start song and typewriter on load
        window.addEventListener("load", () => {
          audio.play().catch((e) => console.log("Audio autoplay blocked:", e));
          setTimeout(typeWriter, 1500);
        });

        // first button: reveal secret message (contains the cute button)
        secretBtn.addEventListener("click", () => {
          secretDiv.classList.add("show");
        });

        // second button: redirect to flower.html
        flowerBtn.addEventListener("click", () => {
          window.location.href = "flowers.html";
        });
      })();
    </script>
    <!-- optional floating particles (cosmetic) -->
    <style>
      .dream-particle {
        position: absolute;
        background: rgba(255, 220, 255, 0.6);
        border-radius: 50%;
        filter: blur(6px);
        animation: floatParticle 18s infinite alternate;
      }
      @keyframes floatParticle {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(40px, -30px) scale(1.2);
        }
      }
      .glitter-particle {
        position: absolute;
        width: 5px;
        height: 5px;
        background: #ffe1ff;
        border-radius: 50%;
        filter: blur(3px);
        animation: twinkle 5s infinite;
      }
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(2);
          background: #ffb3ff;
        }
      }
    </style>
    <script>
      // add dream particles to dreamBg (optional)
      (function () {
        const dreamscape = document.getElementById("dreamBg");
        if (dreamscape) {
          for (let i = 0; i < 35; i++) {
            const part = document.createElement("div");
            part.className = "dream-particle";
            part.style.width = 10 + Math.random() * 40 + "px";
            part.style.height = part.style.width;
            part.style.left = Math.random() * 100 + "%";
            part.style.top = Math.random() * 100 + "%";
            part.style.background = `rgba(255, ${200 + Math.floor(55 * Math.random())}, 255, 0.4)`;
            part.style.animationDuration = 10 + Math.random() * 20 + "s";
            part.style.animationDelay = Math.random() * 10 + "s";
            dreamscape.appendChild(part);
          }
        }
        for (let i = 0; i < 50; i++) {
          const gl = document.createElement("div");
          gl.className = "glitter-particle";
          gl.style.left = Math.random() * 100 + "%";
          gl.style.top = Math.random() * 100 + "%";
          gl.style.animationDelay = Math.random() * 5 + "s";
          gl.style.background = `hsl(${290 + Math.random() * 40}, 80%, 75%)`;
          document.body.appendChild(gl);
        }
      })();
    </script>
  </body>
</html>
